<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:transparent !important;
  user-select:none;
  font-family:'Segoe UI',system-ui,sans-serif;
}
#cv {
  position:absolute; top:0; left:0;
  width:160px; height:160px;
  cursor:grab;
  -webkit-app-region:drag;
}
#cv:active { cursor:grabbing; }

/* ── Strip ── */
.strip {
  position:absolute; bottom:0; left:0; right:0; height:56px;
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:7px;
  -webkit-app-region:no-drag; pointer-events:all;
}
.state-pill {
  display:flex; align-items:center; gap:5px;
  padding:3px 10px 3px 7px; border-radius:20px;
  background:rgba(0,0,0,.38); backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.08);
  transition:border-color .5s; pointer-events:none;
}
.sdot {
  width:5px; height:5px; border-radius:50%;
  background:rgba(155,145,255,.78);
  box-shadow:0 0 5px rgba(155,145,255,.4);
  animation:dp 2.4s ease-in-out infinite;
  transition:background .4s, box-shadow .4s;
}
@keyframes dp { 0%,100%{opacity:1} 50%{opacity:.32} }
.slbl {
  font-size:7.5px; letter-spacing:.18em; text-transform:uppercase;
  color:rgba(220,215,255,.70); font-weight:600;
  transition:color .3s;
}
.btns { display:flex; gap:8px; align-items:center; }
.btn {
  width:24px; height:24px; border-radius:50%;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(0,0,0,.36); color:rgba(210,205,255,.60);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .14s; backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px); pointer-events:all;
}
.btn:hover { background:rgba(139,124,248,.28); border-color:rgba(139,124,248,.7); color:#fff; transform:scale(1.14); }
.btn:active { transform:scale(.88); }
.btn.eye-off { border-color:rgba(255,255,255,.05); color:rgba(220,215,255,.25); }
.btn.eye-off:hover { border-color:rgba(255,80,80,.5); color:rgba(255,120,120,.8); background:rgba(255,40,40,.14); }
.conn { width:5px; height:5px; border-radius:50%; background:#4de89c; box-shadow:0 0 6px rgba(77,232,154,.8); animation:conn 3s ease-in-out infinite; }
.conn.off { background:#ff5a5a; box-shadow:0 0 6px rgba(255,90,90,.6); animation:none; }
@keyframes conn { 0%,100%{opacity:1} 50%{opacity:.22} }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="strip">
  <div class="state-pill" id="pill">
    <div class="sdot" id="sdot"></div>
    <span class="slbl" id="lbl">IDLE</span>
  </div>
  <div class="btns">
    <button class="btn" title="Open SOUL" onclick="doExpand()">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
    </button>
    <div class="conn" id="cdot"></div>
    <button class="btn" id="btn-eye" title="Screen awareness" onclick="doEye()">
      <svg id="eye-svg" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>
</div>

<script>
'use strict';
const api = window.pacify || window.soulAPI || window.electronAPI || null;

// ── Canvas ───────────────────────────────────────────────────────────────────
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W=160, H=160, CX=W/2, CY=H/2;
cv.width=W; cv.height=H;
const SOFT_R = 56;

// ── States ───────────────────────────────────────────────────────────────────
const STATES = {
  idle:      {speed:.72,  ecc:.10, spread:1.08, coreR:7,   glow:.13, drift:.022, fade:.08, lbl:'IDLE',     dc:'rgba(150,140,255,.78)', dg:'rgba(150,140,255,.35)'},
  listening: {speed:1.50, ecc:.30, spread:1.65, coreR:10,  glow:.20, drift:.006, fade:.10, lbl:'LISTEN',   dc:'rgba(77,232,175,.92)',  dg:'rgba(77,232,175,.40)'},
  thinking:  {speed:.80,  ecc:.48, spread:1.85, coreR:7.5, glow:.16, drift:.009, fade:.07, lbl:'THINKING', dc:'rgba(190,140,255,.88)', dg:'rgba(190,140,255,.38)'},
  speaking:  {speed:2.70, ecc:.70, spread:2.80, coreR:14,  glow:.25, drift:.003, fade:.11, lbl:'SPEAKING', dc:'rgba(120,210,255,.92)', dg:'rgba(120,210,255,.42)'},
  alert:     {speed:3.90, ecc:.95, spread:3.90, coreR:17,  glow:.32, drift:.002, fade:.13, lbl:'ALERT',    dc:'rgba(255,100,80,.94)',  dg:'rgba(255,100,80,.40)'},
};

// ── Themes ─── bg is only used for the destination-out fade tint (low impact)
const THEMES = {
  midnight: {stateHues:{idle:230,listening:182,thinking:266,speaking:198,alert:6}, s:62},
  terminal: {stateHues:{idle:142,listening:158,thinking:198,speaking:100,alert:0}, s:68},
  paper:    {stateHues:{idle:36, listening:24, thinking:48, speaking:20, alert:5},  s:56},
};
let THEME = THEMES.midnight;

const lerp  = (a,b,t) => a+(b-a)*t;
const hsla  = (h,s,l,a) => `hsla(${h|0},${s|0}%,${l|0}%,${(+a).toFixed(3)})`;
function lerpS(a,b,t){const o={};for(const k in a)o[k]=typeof a[k]==='number'?lerp(a[k],b[k],t):b[k];return o;}

// ── Particles ─────────────────────────────────────────────────────────────────
function rndR(){const r=Math.random();if(r<.26)return 4+Math.random()*13;if(r<.70)return 19+Math.random()*20;return 39+Math.random()*15;}
const N=200;
const pts=Array.from({length:N},(_,i)=>({
  ang:Math.random()*Math.PI*2, r:rndR(),
  ecc:(Math.random()-.5)*.08, inc:(Math.random()-.5)*.08,
  incP:Math.random()*Math.PI*2,
  spd:(.38+Math.random()*.95)*(Math.random()<.5?1:-1),
  sz:.5+Math.random()*1.3,
  hs:(Math.random()-.5)*26,
  lay:i<N*.25?0:i<N*.72?1:2,
  dx:0,dy:0,da:Math.random()*Math.PI*2,ds:.5+Math.random()*.8,
}));
function perturb(cfg){
  pts.forEach(p=>{
    const f=cfg.spread*.018;
    p.ecc+=(Math.random()-.5)*f*(1+p.lay*.4);
    p.inc+=(Math.random()-.5)*f*.5;
    p.ecc=Math.max(-.92,Math.min(.92,p.ecc));
    p.inc=Math.max(-.9,Math.min(.9,p.inc));
  });
}

// ── State ─────────────────────────────────────────────────────────────────────
let curK='idle',cur={...STATES.idle},tgt={...STATES.idle};
let curH=THEME.stateHues.idle,tgtH=THEME.stateHues.idle;

function setState(key){
  key=String(key||'').toLowerCase().trim();
  if(!STATES[key]||key===curK)return;
  curK=key; tgt={...STATES[key]};
  tgtH=THEME.stateHues[key]??tgtH;
  perturb(tgt);
  document.getElementById('lbl').textContent=STATES[key].lbl;
  const d=document.getElementById('sdot');
  d.style.background=STATES[key].dc;
  d.style.boxShadow=`0 0 6px ${STATES[key].dg}`;
  document.getElementById('pill').style.borderColor=STATES[key].dg;
}
function applyTheme(name){
  const t=THEMES[name]; if(!t)return;
  THEME=t; tgtH=t.stateHues[curK]??tgtH;
}

// ── IPC ───────────────────────────────────────────────────────────────────────
if(api){
  try{
    if(api.onAmbientState)api.onAmbientState(d=>{
      if(!d)return;
      if(typeof d==='string'){setState(d);return;}
      if(d.theme){applyTheme(d.theme);return;}
      setState(d.state||d);
    });
    if(api.on){
      api.on('soul-state',(_,s)=>setState(s));
      api.on('ambient-state',(_,d)=>{if(d)setState(d.state||d);});
      api.on('conn-change',(_,ok)=>{document.getElementById('cdot').className='conn'+(ok?'':' off');});
    }
  }catch(_){}
}
(async()=>{
  try{const cfg=await api?.getConfig?.();if(cfg?.ui?.theme)applyTheme(cfg.ui.theme);}catch(_){}
})();
window.addEventListener('message',e=>{
  const d=e.data; if(!d)return;
  if(typeof d==='string'){setState(d);return;}
  if(d.theme){applyTheme(d.theme);return;}
  if(d.type==='soul-state')setState(d.state);
  if(d.type==='ambient-state')setState(d.state||d);
  if(d.type==='thinking')setState(d.active?'thinking':'idle');
  if(d.type==='assistant_message')setState('speaking');
  if(d.type==='user_message')setState('listening');
  if(d.type==='stream_start')setState('speaking');
  if(d.type==='stream_end')setTimeout(()=>setState('idle'),800);
  if(d.type==='idle')setState('idle');
});

// ── Buttons ───────────────────────────────────────────────────────────────────
function doExpand(){
  if(api?.exitAmbient)api.exitAmbient();
  else if(api?.setAmbient)api.setAmbient(false);
  else if(api?.orbContextMenu)api.orbContextMenu('open');
}
cv.addEventListener('dblclick',doExpand);
let eyeOn=true;
function doEye(){
  eyeOn=!eyeOn;
  document.getElementById('btn-eye').classList.toggle('eye-off',!eyeOn);
  document.getElementById('eye-svg').innerHTML=eyeOn
    ?'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    :'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  try{api?.sendToMain?.({type:'orb_toggle_screen',enabled:eyeOn});}catch(_){}
}

// ── Render ────────────────────────────────────────────────────────────────────
// TRANSPARENT TRAIL TECHNIQUE:
//   Standard approach: fill dark rect → builds opaque black disk
//   This approach: composite 'destination-out' → REMOVES alpha from old pixels
//   Result: old particles fade to fully transparent, new ones glow on any desktop

let t=0;
function frame(){
  t+=.014;
  cur=lerpS(cur,tgt,.030); curH=lerp(curH,tgtH,.022);
  const c=cur,h=curH,s=THEME.s;
  const sr=SOFT_R*(.88+c.spread*.058);

  // ── Step 1: Fade old frame using destination-out (transparent erosion) ──
  ctx.save();
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath(); ctx.arc(CX,CY,sr+14,0,Math.PI*2); ctx.clip();
  ctx.fillStyle=`rgba(0,0,0,${(c.fade*.65).toFixed(3)})`;
  ctx.fillRect(0,0,W,H);
  ctx.restore();

  // ── Step 2: Particles (source-over, normal) ──
  pts.forEach(p=>{
    const spd=p.spd*c.speed*.0030; p.ang+=spd;
    p.da+=(Math.random()-.5)*.22;
    const df=c.drift*p.ds;
    p.dx=lerp(p.dx,Math.cos(p.da)*df*p.r,.06);
    p.dy=lerp(p.dy,Math.sin(p.da)*df*p.r,.06);
    const re=p.r*(1+p.ecc*Math.cos(p.ang));
    const iw=Math.sin(p.ang+p.incP)*p.r*Math.abs(p.inc)*.42;
    const px=CX+Math.cos(p.ang)*re+p.dx;
    const py=CY+Math.sin(p.ang)*re+iw+p.dy;
    const d2=(px-CX)**2+(py-CY)**2;
    const fd=Math.max(0,1-(d2/(sr*sr))); if(fd<.007)return;
    const lb=p.lay===0?.50:p.lay===1?1:.62;
    const al=fd*lb*(.30+Math.min(1,Math.abs(p.ecc))*.70)*.92;
    ctx.beginPath(); ctx.arc(px,py,p.sz*(.68+fd*.52),0,Math.PI*2);
    ctx.fillStyle=hsla(h+p.hs,s,46+fd*36,al); ctx.fill();
    const as=Math.abs(spd);
    if(as>.0016){
      const tl=as*1100*c.speed*.10,pa=p.ang-spd*tl;
      const pr2=p.r*(1+p.ecc*Math.cos(pa));
      const pi2=Math.sin(pa+p.incP)*p.r*Math.abs(p.inc)*.42;
      ctx.beginPath();
      ctx.moveTo(CX+Math.cos(pa)*pr2,CY+Math.sin(pa)*pr2+pi2);
      ctx.lineTo(px,py);
      ctx.strokeStyle=hsla(h+p.hs,s,66,al*.30); ctx.lineWidth=p.sz*.40; ctx.stroke();
    }
  });

  // ── Step 3: Haze glow ──
  const hr=sr*.50;
  const hg=ctx.createRadialGradient(CX,CY,0,CX,CY,hr);
  hg.addColorStop(0,hsla(h,s,8,c.glow*.50));
  hg.addColorStop(.55,hsla(h,s,4,c.glow*.16));
  hg.addColorStop(1,hsla(h,s,0,0));
  ctx.save(); ctx.beginPath(); ctx.arc(CX,CY,hr,0,Math.PI*2); ctx.clip();
  ctx.fillStyle=hg; ctx.fillRect(0,0,W,H); ctx.restore();

  // ── Step 4: Core ──
  const br=Math.sin(t*c.speed*2.0)*.26+.74;
  const cr=c.coreR*br+Math.sin(t*c.speed*3.5)*1.8;
  const cg=ctx.createRadialGradient(CX,CY,0,CX,CY,cr*5.2);
  cg.addColorStop(0,hsla(h,10,98,.94));
  cg.addColorStop(.10,hsla(h,s,80,.80));
  cg.addColorStop(.30,hsla(h,s,52,.42));
  cg.addColorStop(.65,hsla(h,s,30,.12));
  cg.addColorStop(1,hsla(h,s,0,0));
  ctx.beginPath(); ctx.arc(CX,CY,cr*5.2,0,Math.PI*2); ctx.fillStyle=cg; ctx.fill();

  // ── Step 5: Specular ──
  const pg=ctx.createRadialGradient(CX-cr*.20,CY-cr*.20,0,CX,CY,cr*.90);
  pg.addColorStop(0,'rgba(255,255,255,.85)');
  pg.addColorStop(.4,'rgba(255,255,255,.22)');
  pg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(CX,CY,cr*.90,0,Math.PI*2); ctx.fillStyle=pg; ctx.fill();

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
