<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100px; height: 160px; /* expanded for quick-strip */
  background: transparent;
  overflow: visible;
  margin: 0; padding: 0;
  -webkit-app-region: no-drag;
}

/* ─────────────────────────────────────
   OUTWARD PULSE RINGS (beyond the circle)
   Positioned absolutely, centered on orb
───────────────────────────────────── */
.pulse-rings {
  position: absolute;
  top: 0; left: 0;
  width: 100px; height: 100px;
  pointer-events: none; z-index: 0;
}
.ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(139,124,248,.0);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(1);
  opacity: 0;
}
/* Idle: slow soft expand */
.orb-wrap.idle .ring { animation: ring-idle 3.6s ease-out infinite; }
.orb-wrap.idle .ring:nth-child(1){ animation-delay:0s;    border-color:rgba(139,124,248,.22); }
.orb-wrap.idle .ring:nth-child(2){ animation-delay:1.2s;  border-color:rgba(139,124,248,.15); }
.orb-wrap.idle .ring:nth-child(3){ animation-delay:2.4s;  border-color:rgba(139,124,248,.08); }

/* Thinking: fast tight blue rings */
.orb-wrap.thinking .ring { animation: ring-think 1.2s ease-out infinite; }
.orb-wrap.thinking .ring:nth-child(1){ animation-delay:0s;   border-color:rgba(96,165,250,.4); }
.orb-wrap.thinking .ring:nth-child(2){ animation-delay:.4s;  border-color:rgba(96,165,250,.25);}
.orb-wrap.thinking .ring:nth-child(3){ animation-delay:.8s;  border-color:rgba(96,165,250,.12);}

/* Speaking: green ripple */
.orb-wrap.speaking .ring { animation: ring-speak .9s ease-out infinite; }
.orb-wrap.speaking .ring:nth-child(1){ animation-delay:0s;   border-color:rgba(77,232,156,.45);}
.orb-wrap.speaking .ring:nth-child(2){ animation-delay:.3s;  border-color:rgba(77,232,156,.28);}
.orb-wrap.speaking .ring:nth-child(3){ animation-delay:.6s;  border-color:rgba(77,232,156,.14);}

/* Pending: amber alert */
.orb-wrap.pending .ring { animation: ring-pending 1.6s ease-out infinite; }
.orb-wrap.pending .ring:nth-child(1){ animation-delay:0s;   border-color:rgba(245,191,90,.5); }
.orb-wrap.pending .ring:nth-child(2){ animation-delay:.55s; border-color:rgba(245,191,90,.3); }
.orb-wrap.pending .ring:nth-child(3){ animation-delay:1.1s; border-color:rgba(245,191,90,.15);}

@keyframes ring-idle  {
  0%   { width:100px;height:100px;opacity:0; }
  15%  { opacity:1; }
  100% { width:180px;height:180px;opacity:0; }
}
@keyframes ring-think {
  0%   { width:100px;height:100px;opacity:0; }
  12%  { opacity:.9; }
  100% { width:150px;height:150px;opacity:0; }
}
@keyframes ring-speak {
  0%   { width:100px;height:100px;opacity:0; }
  10%  { opacity:1; }
  100% { width:165px;height:165px;opacity:0; }
}
@keyframes ring-pending {
  0%   { width:100px;height:100px;opacity:0; }
  15%  { opacity:.9; }
  100% { width:160px;height:160px;opacity:0; }
}

/* ─────────────────────────────────────
   ORB WRAPPER — clips the 100px orb
───────────────────────────────────── */
.orb-wrap {
  position: relative;
  width: 100px; height: 100px;
  flex-shrink: 0;
  /* Hard circle clip */
  -webkit-mask: radial-gradient(circle 49px at center, black 100%, transparent 100%);
}

/* ─────────────────────────────────────
   ORB SHELL
───────────────────────────────────── */
.orb {
  width: 100px; height: 100px; border-radius: 50%;
  background: radial-gradient(circle at 38% 32%,
    #171a2c 0%, #0c0e1a 55%, #060811 100%);
  border: 1px solid rgba(139,124,248,0.3);
  box-shadow:
    0 0 0 1px rgba(139,124,248,.06),
    0 14px 44px rgba(0,0,0,.96),
    inset 0 1px 0 rgba(255,255,255,.06),
    inset 0 -1px 0 rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  transition: border-color .4s, box-shadow .4s;
  user-select: none;
}

/* State borders */
.orb-wrap.thinking .orb {
  border-color: rgba(96,165,250,.52);
  box-shadow: 0 0 0 1px rgba(96,165,250,.08),
    0 14px 44px rgba(0,0,0,.96), 0 0 26px rgba(96,165,250,.18);
}
.orb-wrap.speaking .orb {
  border-color: rgba(77,232,156,.44);
  box-shadow: 0 0 0 1px rgba(77,232,156,.07),
    0 14px 44px rgba(0,0,0,.96), 0 0 22px rgba(77,232,156,.16);
}
.orb-wrap.pending .orb {
  border-color: rgba(245,191,90,.62);
  animation: pending-glow 1.4s ease-in-out infinite;
}
@keyframes pending-glow {
  0%,100%{ box-shadow:0 14px 44px rgba(0,0,0,.96),0 0 10px rgba(245,191,90,.14); }
  50%    { box-shadow:0 14px 44px rgba(0,0,0,.96),0 0 30px rgba(245,191,90,.44); }
}

/* Outer spinning ring */
.orb::before {
  content:''; position:absolute; inset:-1px; border-radius:50%;
  border:1.5px solid transparent;
  border-top-color: rgba(139,124,248,.58);
  border-right-color: rgba(139,124,248,.14);
  animation: spin 9s linear infinite;
}
.orb-wrap.thinking .orb::before { border-top-color:rgba(96,165,250,.8);  animation-duration:2s;   }
.orb-wrap.speaking .orb::before { border-top-color:rgba(77,232,156,.7);  animation-duration:1.5s; }
.orb-wrap.pending  .orb::before { border-top-color:rgba(245,191,90,.8);  animation-duration:3s;   }
@keyframes spin { to { transform:rotate(360deg); } }

/* Inner counter-ring */
.orb::after {
  content:''; position:absolute; inset:9px; border-radius:50%;
  border:1px solid transparent;
  border-bottom-color: rgba(139,124,248,.2);
  border-left-color:   rgba(139,124,248,.09);
  animation: spin 16s linear infinite reverse;
}
.orb-wrap.thinking .orb::after { border-bottom-color:rgba(96,165,250,.24); animation-duration:7s;  }
.orb-wrap.speaking .orb::after { border-bottom-color:rgba(77,232,156,.22); animation-duration:4.5s;}

/* Three arc rings */
.arcs { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
.arc  { position:absolute; border-radius:50%; border:1px solid transparent; }
.a1 { width:80px;height:80px; border-top-color:rgba(139,124,248,.15); border-left-color:rgba(139,124,248,.06); animation:spin 16s linear infinite; }
.a2 { width:62px;height:62px; border-right-color:rgba(139,124,248,.19); border-bottom-color:rgba(139,124,248,.05); animation:spin 10s linear infinite reverse; }
.a3 { width:46px;height:46px; border-top-color:rgba(139,124,248,.12); border-bottom-color:rgba(139,124,248,.12); animation:spin 6s linear infinite; }
.orb-wrap.thinking .a1{border-top-color:rgba(96,165,250,.22);  animation-duration:5.5s; }
.orb-wrap.thinking .a2{border-right-color:rgba(96,165,250,.28); animation-duration:3s;  }
.orb-wrap.thinking .a3{border-top-color:rgba(96,165,250,.2); border-bottom-color:rgba(96,165,250,.2); animation-duration:2s; }
.orb-wrap.speaking .a1{border-top-color:rgba(77,232,156,.18);  animation-duration:4.5s;}
.orb-wrap.speaking .a2{border-right-color:rgba(77,232,156,.22); animation-duration:2.8s;}
.orb-wrap.speaking .a3{border-top-color:rgba(77,232,156,.16); border-bottom-color:rgba(77,232,156,.16); animation-duration:1.8s;}

/* ── Waveform ── */
.wave { position:relative; z-index:3; display:flex; align-items:center; gap:3px; height:28px; }
.bar  { width:3px; border-radius:3px; background:#8b7cf8; box-shadow:0 0 6px rgba(139,124,248,.55); transform-origin:bottom center; animation:idle-breathe 2.8s ease-in-out infinite; }
.bar:nth-child(1){height:8px;  animation-delay:0s;  }
.bar:nth-child(2){height:14px; animation-delay:.2s; }
.bar:nth-child(3){height:22px; animation-delay:.4s; }
.bar:nth-child(4){height:14px; animation-delay:.6s; }
.bar:nth-child(5){height:8px;  animation-delay:.8s; }
@keyframes idle-breathe { 0%,100%{transform:scaleY(1);opacity:.5} 50%{transform:scaleY(.3);opacity:.18} }
.orb-wrap.thinking .bar { background:#60a5fa; box-shadow:0 0 8px rgba(96,165,250,.9); animation:think-pulse .48s ease-in-out infinite alternate; }
.orb-wrap.thinking .bar:nth-child(1){animation-delay:0s;}
.orb-wrap.thinking .bar:nth-child(2){animation-delay:.07s;}
.orb-wrap.thinking .bar:nth-child(3){animation-delay:.14s;}
.orb-wrap.thinking .bar:nth-child(4){animation-delay:.07s;}
.orb-wrap.thinking .bar:nth-child(5){animation-delay:0s;}
@keyframes think-pulse { from{transform:scaleY(.4);opacity:.38} to{transform:scaleY(1.8);opacity:1} }
.orb-wrap.speaking .bar{background:#4de89c;box-shadow:0 0 8px rgba(77,232,156,.75);}
.orb-wrap.speaking .bar:nth-child(1){animation:speak-wave .62s ease-in-out infinite;animation-delay:0s;}
.orb-wrap.speaking .bar:nth-child(2){animation:speak-wave .78s ease-in-out infinite;animation-delay:.1s;}
.orb-wrap.speaking .bar:nth-child(3){animation:speak-wave .5s  ease-in-out infinite;animation-delay:.2s;}
.orb-wrap.speaking .bar:nth-child(4){animation:speak-wave .72s ease-in-out infinite;animation-delay:.1s;}
.orb-wrap.speaking .bar:nth-child(5){animation:speak-wave .62s ease-in-out infinite;animation-delay:0s;}
@keyframes speak-wave { 0%{transform:scaleY(1)} 35%{transform:scaleY(2.2)} 65%{transform:scaleY(.5)} 100%{transform:scaleY(1.2)} }
.orb-wrap.pending .bar { background:#f5bf5a; box-shadow:0 0 6px rgba(245,191,90,.65); }

/* Notification badge */
.badge {
  position:absolute; top:4px; right:4px;
  width:18px; height:18px; border-radius:50%;
  background:#f5bf5a; color:#080a10;
  font-size:8.5px; font-weight:800;
  display:none; align-items:center; justify-content:center;
  z-index:6; box-shadow:0 0 12px rgba(245,191,90,.85);
  animation:badge-pop .8s ease-in-out infinite;
}
.badge.show{display:flex;}
@keyframes badge-pop{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* ─────────────────────────────────────
   HOVER QUICK BUTTONS STRIP
   Slides in below the orb on hover
───────────────────────────────────── */
.quick-strip {
  width: 100px;
  display: flex; justify-content: center; gap: 6px;
  padding: 7px 0 0;
  opacity: 0;
  transform: translateY(-6px);
  transition: opacity .22s ease, transform .22s ease;
  pointer-events: none;
}
.quick-strip.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.qbtn {
  width: 28px; height: 28px; border-radius: 9px;
  background: rgba(11,13,23,.92);
  border: 1px solid rgba(139,124,248,.22);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: rgba(221,216,243,.65);
  transition: background .13s, border-color .13s, color .13s;
  backdrop-filter: blur(8px);
}
.qbtn:hover { background:rgba(139,124,248,.18); border-color:rgba(139,124,248,.5); color:#ddd8f3; }
.qbtn.danger:hover { background:rgba(238,110,110,.12); border-color:rgba(238,110,110,.4); color:#ee6e6e; }

/* Dragging cursor */
.orb-wrap.dragging .orb { cursor: grabbing !important; }
</style>
</head>
<body>

<!-- Pulse rings outside orb (not clipped by -webkit-mask) -->
<div class="pulse-rings" id="pulse-rings">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<div class="orb-wrap idle" id="orb-wrap">
  <div class="orb" id="orb">
    <div class="arcs">
      <div class="arc a1"></div>
      <div class="arc a2"></div>
      <div class="arc a3"></div>
    </div>
    <div class="wave">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div class="badge" id="badge"></div>
  </div>
</div>

<!-- Quick-action strip (visible on hover) -->
<div class="quick-strip" id="quick-strip">
  <!-- Open main -->
  <div class="qbtn" id="qbtn-open" title="Open SOUL">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <polyline points="15 3 21 3 21 9"/><line x1="21" y1="3" x2="14" y2="10"/>
      <path d="M10 13H3v8h8v-7"/>
    </svg>
  </div>
  <!-- Workspace -->
  <div class="qbtn" id="qbtn-ws" title="Workspace">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
    </svg>
  </div>
  <!-- Exit ambient -->
  <div class="qbtn danger" id="qbtn-exit" title="Exit Ambient">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────
let _state = 'idle';
let pendingCount = 0;

const wrap       = document.getElementById('orb-wrap');
const pulseRings = document.getElementById('pulse-rings');
const strip      = document.getElementById('quick-strip');
const badge      = document.getElementById('badge');

function setState(s) {
  if (s === _state) return;
  _state = s;
  const hasPending = wrap.classList.contains('pending');
  wrap.className = 'orb-wrap ' + s;
  pulseRings.className = 'pulse-rings'; // reset
  pulseRings.classList.add(s);
  if (hasPending && s !== 'pending') {
    wrap.classList.add('pending');
    pulseRings.classList.add('pending');
  }
}

function setPending(n) {
  pendingCount = Math.max(0, n);
  if (pendingCount > 0) {
    badge.textContent = pendingCount;
    badge.classList.add('show');
    wrap.classList.add('pending');
    pulseRings.classList.add('pending');
  } else {
    badge.classList.remove('show');
    wrap.classList.remove('pending');
    pulseRings.classList.remove('pending');
  }
}

// ── Hover expand/collapse ──────────────────────────
let hoverExpanded = false;

document.addEventListener('mouseenter', () => {
  if (hoverExpanded || isDragging) return;
  hoverExpanded = true;
  strip.classList.add('visible');
  window.pacify?.orbContextMenu('hover-expand');
});

document.addEventListener('mouseleave', () => {
  if (!hoverExpanded) return;
  hoverExpanded = false;
  strip.classList.remove('visible');
  window.pacify?.orbContextMenu('hover-collapse');
});

// Quick strip buttons
document.getElementById('qbtn-open').addEventListener('click', e => {
  e.stopPropagation();
  window.pacify?.orbContextMenu('open');
});
document.getElementById('qbtn-ws').addEventListener('click', e => {
  e.stopPropagation();
  window.pacify?.orbContextMenu('workspace');
});
document.getElementById('qbtn-exit').addEventListener('click', e => {
  e.stopPropagation();
  window.pacify?.orbContextMenu('exit');
});

// ── Drag / click / double-click ────────────────────
let isDragging    = false;
let hasDragged    = false;
let dragStartX    = 0, dragStartY = 0;
let holdTimer     = null;
let clickCount    = 0, clickTimer = null;
let mouseDownTime = 0;

document.getElementById('orb').addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isDragging    = false;
  hasDragged    = false;
  dragStartX    = e.screenX;
  dragStartY    = e.screenY;
  mouseDownTime = Date.now();

  // Hold-to-drag: after 250ms holding without movement, enter drag mode
  holdTimer = setTimeout(() => {
    isDragging = true;
    wrap.classList.add('dragging');
    window.pacify?.ipc?.send('orb-drag-start', { x: e.screenX, y: e.screenY });
  }, 250);

  const onMove = me => {
    const moved = Math.abs(me.screenX - dragStartX) + Math.abs(me.screenY - dragStartY);
    if (moved > 4) {
      // Immediate drag if moved significantly (even before hold timer)
      if (!isDragging) {
        isDragging = true;
        hasDragged = true;
        clearTimeout(holdTimer);
        wrap.classList.add('dragging');
        window.pacify?.ipc?.send('orb-drag-start', { x: dragStartX, y: dragStartY });
      }
      window.pacify?.ipc?.send('orb-drag-move', { x: me.screenX, y: me.screenY });
    }
  };

  const onUp = ue => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    clearTimeout(holdTimer);
    wrap.classList.remove('dragging');

    if (isDragging) {
      window.pacify?.ipc?.send('orb-drag-end');
      isDragging = false;
      hasDragged = true;
      return;
    }

    // Click — detect double-click
    clickCount++;
    if (clickTimer) clearTimeout(clickTimer);
    clickTimer = setTimeout(() => {
      if (clickCount >= 2) {
        // Double click → open main window
        window.pacify?.orbContextMenu('dblclick');
      } else {
        // Single click → open main window (same action)
        window.pacify?.orbContextMenu('open');
      }
      clickCount = 0;
      clickTimer = null;
    }, 240);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

// Right click → workspace (no context menu)
document.addEventListener('contextmenu', e => {
  e.preventDefault();
  window.pacify?.orbContextMenu('workspace');
});

// ── IPC events from main window ────────────────────
window.pacify?.onAmbientState?.((msg) => {
  if (!msg) return;
  switch (msg.type) {
    case 'thinking':
      setState(msg.active ? 'thinking' : 'idle'); break;
    case 'assistant_message':
      setState('speaking');
      setTimeout(() => setState('idle'), 3200);
      break;
    case 'user_message':
      setState('thinking'); break;
    case 'action_pending':
      setPending(pendingCount + 1); break;
    case 'action_result':
      if (!msg.total || msg.step === msg.total) setPending(Math.max(0, pendingCount - 1));
      break;
  }
});
</script>
</body>
</html>
