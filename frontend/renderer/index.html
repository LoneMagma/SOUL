<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOUL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400&display=swap');

:root {
  --bg: #07090e;
  --surface: rgba(255,255,255,0.034);
  --border: rgba(255,255,255,0.065);
  --accent: #8b7cf8;
  --accent-soft: rgba(139,124,248,0.1);
  --text: #ddd8f3;
  --dim: rgba(221,216,243,0.34);
  --green: #4de89c;
  --red: #ee6e6e;
  --warn: #f5bf5a;
  --teal: #2dc4a8;
  --glow: rgba(139,124,248,0.26);
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  font-family: 'Syne', sans-serif;
  background: transparent;
  color: var(--text);
  width: 400px; height: 640px;
  overflow: hidden;
  border-radius: 22px;
  user-select: none;
  -webkit-app-region: no-drag;
}

/* ════════════ SUMMON ANIMATION ════════════ */
body { animation: summon .22s cubic-bezier(.16,1,.3,1) both; }
@keyframes summon {
  from { opacity:0; transform:scale(.96) translateY(6px); }
  to   { opacity:1; transform:none; }
}

/* ════════════ AMBIENT SHELL ════════════ */
body.ambient {
  width: 80px; height: 80px;
  background: transparent !important;
}
body.ambient .shell { display:none !important; }
body.ambient .amb   { display:flex !important; }

.amb {
  display: none;
  width: 80px; height: 80px;
  border-radius: 50%;
  /* Fully opaque so it floats visibly on any desktop background */
  background: #0d0f18;
  border: 1px solid rgba(139,124,248,0.35);
  box-shadow:
    0 8px 32px rgba(0,0,0,.85),
    0 0 0 1px rgba(139,124,248,.1),
    0 0 24px rgba(139,124,248,.12);
  align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  animation: summon .18s ease both;
}

/* Rotating outer ring */
.amb::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: 50%;
  border: 1px solid transparent;
  border-top-color: rgba(139,124,248,.5);
  animation: amb-spin 6s linear infinite;
}
@keyframes amb-spin { to{transform:rotate(360deg)} }

/* Central signal */
.amb-signal { position:relative; width:28px; height:28px; display:flex; align-items:center; justify-content:center; z-index:1; }
.amb-arc { position:absolute; border-radius:50%; border:1px solid transparent; }
.aa1 { width:28px;height:28px; border-top-color:rgba(139,124,248,.6); border-right-color:rgba(139,124,248,.1); border-left-color:rgba(139,124,248,.1); animation:spin 8s linear infinite; }
.aa2 { width:18px;height:18px; border-right-color:rgba(139,124,248,.4); border-bottom-color:rgba(139,124,248,.07); animation:spin 5s linear infinite reverse; }
.aa3 { width:10px;height:10px; border-top-color:rgba(139,124,248,.25); border-bottom-color:rgba(139,124,248,.25); animation:spin 3s linear infinite; }
.aa-dot { width:3px;height:3px; border-radius:50%; background:var(--accent); box-shadow:0 0 6px var(--glow); animation:aadot 3s ease-in-out infinite; position:relative; z-index:2; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes aadot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.8);box-shadow:0 0 12px var(--glow)} }

.amb-signal.thinking .aa-dot { background:#60a5fa; animation:aa-think .5s ease-in-out infinite alternate; }
@keyframes aa-think { from{transform:scale(1)} to{transform:scale(2.2)} }
.amb-signal.speaking .aa-dot { animation:aa-speak .18s ease-in-out infinite alternate; }
@keyframes aa-speak { from{transform:scale(1)} to{transform:scale(2.5);box-shadow:0 0 16px var(--glow);} }

/* Micro-action buttons — appear on hover */
.amb-actions {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity .18s;
  background: rgba(7,9,14,.82);
  gap: 0;
}
.amb:hover .amb-actions { opacity: 1; }
.amb:hover .amb-signal { opacity: 0; transition: opacity .18s; }

.amb-btn {
  position: absolute;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(30,32,46,0.95);
  border: 1.5px solid rgba(139,124,248,0.5);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, border-color .12s, transform .1s;
  color: rgba(221,216,243,0.85);
}
.amb-btn:hover {
  background: rgba(139,124,248,0.22);
  border-color: rgba(139,124,248,.85);
  color: white;
  transform: scale(1.15);
}

/* Position the 3 buttons around the circle */
.amb-btn.expand { top: 3px; left: 50%; transform: translateX(-50%); }
.amb-btn.expand:hover { transform: translateX(-50%) scale(1.15); }
.amb-btn.eye    { bottom: 5px; left: 7px; }
.amb-btn.close  { bottom: 5px; right: 7px; }

/* Notification badge */
.amb-badge {
  position: absolute; top: 4px; right: 4px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--warn); box-shadow: 0 0 6px var(--warn);
  display: none; z-index: 3;
  animation: badge-p .8s ease-in-out infinite;
}
@keyframes badge-p { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

/* ════════════ MAIN SHELL ════════════ */
.shell {
  width: 400px; height: 640px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 22px;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,.75), 0 0 0 1px rgba(255,255,255,.04);
  will-change: opacity, transform;
}

/* Titlebar */
.titlebar {
  -webkit-app-region: drag;
  height: 42px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.ctrls { -webkit-app-region:no-drag; display:flex; gap:6px; align-items:center; }
.ctrl { width:10px;height:10px;border-radius:50%;border:none;cursor:pointer;transition:opacity .15s; }
.ctrl:hover{opacity:.75} .c-close{background:#ff5f56} .c-min{background:#ffbd2e} .c-amb{background:var(--teal)}

.brand {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-size:10px;font-weight:700;letter-spacing:.28em;color:var(--dim);text-transform:uppercase;
  pointer-events: none; -webkit-app-region: no-drag;
}
.titlebar { position: relative; }

.hdr-right { -webkit-app-region:no-drag; display:flex; align-items:center; gap:7px; }

/* Eye toggle — icon-only circle, same size as traffic lights */
.eye-toggle {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all .2s;
  color: var(--dim);
  flex-shrink: 0;
  position: relative;
}
.eye-toggle:hover { border-color: rgba(139,124,248,.45); color: var(--accent); }
.eye-toggle.on { border-color: rgba(139,124,248,.5); color: var(--accent); background: var(--accent-soft); box-shadow: 0 0 8px rgba(139,124,248,.2); }
.eye-toggle.off { opacity: .45; }
.eye-toggle svg { flex-shrink: 0; }

.sdot { width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:sdot 2.8s ease-in-out infinite; }
.ws-btn { height:24px;padding:0 8px;gap:5px;border-radius:7px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dim);transition:all .15s; }
.ws-btn:hover { border-color:rgba(139,124,248,.4);color:var(--accent);background:var(--accent-soft); }
.ws-btn.active { border-color:rgba(139,124,248,.5);color:var(--accent);background:var(--accent-soft); }
@keyframes sdot{0%,100%{opacity:1}50%{opacity:.3}}

/* Signal entity */
.entity-zone {
  height: 172px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 13px; flex-shrink: 0; position: relative;
}

.signal {
  position: relative; width: 110px; height: 110px;
  display: flex; align-items: center; justify-content: center;
}
.s-arc { position:absolute; border-radius:50%; border:1px solid transparent; }
.s1 { width:110px;height:110px; border-top-color:rgba(139,124,248,.65); border-right-color:rgba(139,124,248,.1); border-left-color:rgba(139,124,248,.1); animation:spin 9s linear infinite; }
.s2 { width:82px;height:82px; border-right-color:rgba(139,124,248,.45); border-bottom-color:rgba(139,124,248,.08); animation:spin 6.5s linear infinite reverse; }
.s3 { width:56px;height:56px; border-top-color:rgba(139,124,248,.28); border-bottom-color:rgba(139,124,248,.28); animation:spin 4s linear infinite; }

.s-core {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px rgba(139,124,248,.1), 0 0 14px var(--glow), 0 0 28px rgba(139,124,248,.12);
  animation: core-pulse 3s ease-in-out infinite;
  position: relative; z-index: 2;
}
@keyframes core-pulse {
  0%,100%{transform:scale(1)} 50%{transform:scale(1.4);box-shadow:0 0 0 5px rgba(139,124,248,.08),0 0 22px var(--glow);}
}

.signal.thinking .s-core {
  background:#60a5fa; animation:core-think .5s ease-in-out infinite alternate;
  box-shadow:0 0 0 3px rgba(96,165,250,.15),0 0 18px rgba(96,165,250,.5);
}
.signal.thinking .s1,.signal.thinking .s2,.signal.thinking .s3 { border-color:transparent; }
.signal.thinking .s1 { border-top-color:rgba(96,165,250,.7); animation-duration:1.4s; }
.signal.thinking .s2 { border-right-color:rgba(96,165,250,.5); animation-duration:1.1s; }
.signal.thinking .s3 { border-top-color:rgba(96,165,250,.35); border-bottom-color:rgba(96,165,250,.35); animation-duration:.8s; }
@keyframes core-think{from{transform:scale(1)}to{transform:scale(2.2)}}

.signal.speaking .s-core { animation:core-speak .2s ease-in-out infinite alternate; }
@keyframes core-speak{from{transform:scale(1)}to{transform:scale(2.4);box-shadow:0 0 0 6px rgba(139,124,248,.08),0 0 28px var(--glow);}}

.entity-lbl { font-size:9px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;font-weight:500; }

/* Task bar */
.task-bar {
  height: 34px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px; gap: 8px;
  flex-shrink: 0;
}
.task-icon { width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.6;flex-shrink:0; }
.task-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--dim); overflow:hidden; white-space:nowrap; text-overflow:ellipsis; flex:1; }
.task-label .task-name { color:var(--text); }

/* Stats strip */
.stats {
  height: 34px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  flex-shrink: 0;
}
.stat {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; border-right:1px solid var(--border); padding:0 4px;
  font-family:'JetBrains Mono',monospace;
}
.stat:last-child{border-right:none}
.stat-l{font-size:7px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.stat-v{font-size:10px;color:var(--text)}
.stat-net { flex:1.3; }

/* Screen off indicator */
.screen-off { font-size:9px;color:rgba(238,110,110,.7);text-align:center;padding:3px 0;background:rgba(238,110,110,.05);border-bottom:1px solid rgba(238,110,110,.1);display:none;flex-shrink:0;letter-spacing:.08em; }

/* Error banner */
.err { background:rgba(238,110,110,.07);border-bottom:1px solid rgba(238,110,110,.15);padding:8px 14px;font-size:12px;color:var(--red);line-height:1.4;display:none;flex-shrink:0; }

/* Chat */
.chat{flex:1;overflow-y:auto;padding:12px 14px 6px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;}
.chat::-webkit-scrollbar{width:2px;} .chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);}

.msg{max-width:86%;padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.55;animation:msgin .18s ease;}
@keyframes msgin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;background:var(--accent-soft);border:1px solid rgba(139,124,248,.18);border-bottom-right-radius:3px;}
.msg.soul{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:3px;}
.msg.wake{border-color:rgba(139,124,248,.25);background:rgba(139,124,248,.06);}

/* Action card */
.acard{border:1px solid rgba(245,191,90,.28);background:rgba(245,191,90,.04);border-radius:13px;padding:12px 14px;animation:msgin .18s ease;flex-shrink:0;}
.atag{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--warn);text-transform:uppercase;margin-bottom:5px;}
.atext{font-size:13px;line-height:1.4;margin-bottom:10px;}
.abtns{display:flex;gap:6px;}
.bok{flex:1;padding:7px;background:rgba(77,232,154,.08);border:1px solid rgba(77,232,154,.28);border-radius:8px;color:var(--green);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:background .15s;}
.bok:hover{background:rgba(77,232,154,.18);}
.bno{flex:1;padding:7px;background:rgba(238,110,110,.06);border:1px solid rgba(238,110,110,.2);border-radius:8px;color:var(--red);font-family:'Syne',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:background .15s;}
.bno:hover{background:rgba(238,110,110,.16);}

/* Thinking dots */
.dots{display:flex;gap:4px;align-items:center;padding:9px 12px;align-self:flex-start;}
.dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:.4;animation:db 1.1s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
@keyframes db{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}

/* Notification */
.notif{position:absolute;bottom:66px;left:12px;right:12px;border-radius:10px;padding:9px 13px;font-size:12px;line-height:1.4;z-index:30;animation:notif-in .2s ease;display:none;}
@keyframes notif-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.notif.info{background:rgba(139,124,248,.1);border:1px solid rgba(139,124,248,.24);color:var(--text);}
.notif.warn{background:rgba(245,191,90,.08);border:1px solid rgba(245,191,90,.26);color:var(--warn);}
.notif.pattern{background:rgba(45,196,168,.08);border:1px solid rgba(45,196,168,.26);color:var(--teal);}

/* Shortcuts — toggleable */
.kbd-row{
  display:none;
  flex-shrink:0;
  padding:4px 12px;
  gap:8px; flex-wrap:wrap;
  border-top:1px solid var(--border);
}
.kbd-row.open { display:flex; }
.kbd-hint{font-size:9px;color:var(--dim);display:flex;align-items:center;gap:4px;}
.kbd{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:3px;padding:1px 4px;font-family:'JetBrains Mono',monospace;font-size:8px;}

/* Input area */
.input-area{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:7px;align-items:center;flex-shrink:0;}
.inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color .15s;}
.inp:focus{border-color:rgba(139,124,248,.4);}
.inp::placeholder{color:var(--dim);}
.btn-send{width:32px;height:32px;border-radius:9px;border:none;background:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s,transform .1s;flex-shrink:0;}
.btn-send:hover{opacity:.8;} .btn-send:active{transform:scale(.92);}

/* Shortcuts toggle btn */
.kbd-toggle{
  padding: 0 9px; height:26px;
  border-radius:20px;
  border:1px solid var(--border);
  background:var(--surface);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  font-family:'Syne',sans-serif;
  font-size:9px;font-weight:600;letter-spacing:.1em;
  color:var(--dim);
  text-transform:uppercase;
  transition:all .15s;
  gap:5px;
}
.kbd-toggle:hover{border-color:rgba(139,124,248,.35);color:var(--text);}
.kbd-toggle.active{border-color:rgba(139,124,248,.4);color:var(--accent);background:var(--accent-soft);}
</style>
</head>
<body>

<!-- AMBIENT -->
<div class="amb" id="amb" onclick="handleAmbClick(event)">
  <div class="amb-signal" id="amb-sig">
    <div class="amb-arc aa1"></div>
    <div class="amb-arc aa2"></div>
    <div class="amb-arc aa3"></div>
    <div class="aa-dot"></div>
  </div>
  <div class="amb-actions" id="amb-actions">
    <button class="amb-btn expand" onclick="exitAmbient()" title="Expand">
      <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
    </button>
    <button class="amb-btn eye" id="amb-eye" onclick="toggleScreen()" title="Toggle screen">
      <svg id="amb-eye-icon" width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
    <button class="amb-btn close" onclick="window.pacify?.close()" title="Close">
      <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="amb-badge" id="amb-badge"></div>
</div>

<!-- MAIN -->
<div class="shell">
  <div class="titlebar">
    <div class="ctrls">
      <button class="ctrl c-close" onclick="window.pacify?.close()"></button>
      <button class="ctrl c-min" onclick="window.pacify?.minimize()"></button>
      <button class="ctrl c-amb" onclick="enterAmbient()" title="Ambient (Alt+Z)"></button>
    </div>
    <span class="brand" id="entity-name">SOUL</span>
    <div class="hdr-right">
      <button class="eye-toggle on" id="eye-toggle" onclick="toggleScreen()" title="Screen Awareness">
        <svg id="eye-svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
      <button class="ws-btn" id="ws-btn" onclick="toggleWorkspace()" title="Workspace (Alt+W)">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">WORKSPACE</span>
      </button>
      <div class="sdot" id="sdot"></div>
    </div>
  </div>

  <div class="err" id="err"></div>
  <div class="screen-off" id="screen-off">SCREEN AWARENESS OFF</div>

  <div class="entity-zone">
    <div class="signal" id="signal">
      <div class="s-arc s1"></div>
      <div class="s-arc s2"></div>
      <div class="s-arc s3"></div>
      <div class="s-core"></div>
    </div>
    <div class="entity-lbl" id="entity-lbl">online · listening</div>
  </div>

  <div class="task-bar">
    <div class="task-icon"></div>
    <div class="task-label" id="task-label"><span class="task-name">—</span></div>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-l">CPU</span>
      <span class="stat-v" id="sv-cpu">—</span>
    </div>
    <div class="stat">
      <span class="stat-l">RAM</span>
      <span class="stat-v" id="sv-ram">—</span>
    </div>
    <div class="stat">
      <span class="stat-l">GPU</span>
      <span class="stat-v" id="sv-gpu">—</span>
    </div>
    <div class="stat stat-net">
      <span class="stat-l">NET</span>
      <span class="stat-v" id="sv-net">—</span>
    </div>
    <div class="stat">
      <span class="stat-l">BAT</span>
      <span class="stat-v" id="sv-bat">—</span>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="notif" id="notif"></div>

  <div class="kbd-row" id="kbd-row">
    <span class="kbd-hint"><span class="kbd">Alt+S</span> summon</span>
    <span class="kbd-hint"><span class="kbd">Alt+Z</span> ambient</span>
    <span class="kbd-hint"><span class="kbd">Alt+E</span> screen</span>
    <span class="kbd-hint"><span class="kbd">Alt+X</span> clear</span>
    <span class="kbd-hint"><span class="kbd">Alt+T</span> talk</span>
  </div>

  <div class="input-area">
    <input class="inp" id="inp" type="text" placeholder="Talk to her…" autocomplete="off"/>
    <button class="kbd-toggle" id="kbd-toggle-btn" onclick="toggleKbd()" title="Shortcuts">
      <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/></svg>
      KEYS
    </button>
    <button class="btn-send" onclick="sendText()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg>
    </button>
  </div>
</div>

<script>
let ws = null, screenEnabled = true, isAmbient = false, notifTimer = null, kbdOpen = false;
// Event buffer for workspace replay (persists across workspace open/close)
const EVENT_BUFFER = [];
const EVENT_BUFFER_MAX = 300;
function bufferEvent(msg) {
  EVENT_BUFFER.push(msg);
  if (EVENT_BUFFER.length > EVENT_BUFFER_MAX) EVENT_BUFFER.shift();
}

// ── WebSocket ──────────────────────────────────
async function connect() {
  const url = window.pacify ? await window.pacify.getBackendUrl() : 'ws://127.0.0.1:8765/ws';
  ws = new WebSocket(url);
  ws.onopen  = () => { setDot(true); setLabel('online · listening'); startStatsPoll(); };
  ws.onclose = () => { setDot(false); setLabel('reconnecting…'); setTimeout(connect, 3000); };
  ws.onerror = () => { setDot(false); };
  ws.onmessage = e => handle(JSON.parse(e.data));
}
function send(o) { if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(o)); }
function startStatsPoll() { setInterval(() => send({type:'system_status'}), 3000); }

// ── Handler ────────────────────────────────────
function handle(msg) {
  switch(msg.type) {
    case 'init':
      const name = msg.entity_name || 'SOUL';
      document.getElementById('entity-name').textContent = name.toUpperCase();
      document.title = name;
      if (typeof msg.screen_enabled === 'boolean') setScreenUI(msg.screen_enabled);
      if (msg.task_label) setTaskLabel(msg.task_label);
      if (msg.stats) updateStats(msg.stats);
      if (msg.computer_name) window._computerName = msg.computer_name;
      // Correct input placeholder and workspace button label for entity name
      const obj = msg.pronoun_object || 'her';
      document.getElementById('inp').placeholder = `Talk to ${obj}…`;
      break;
    case 'user_message':
      addMsg('user', msg.text); break;
    case 'assistant_message':
      removeThinking();
      addMsg('soul', msg.text, msg.is_wake);
      setState('speaking');
      setTimeout(() => setState('idle'), 2200);
      break;
    case 'thinking':
      msg.active ? showThinking() : removeThinking();
      setState(msg.active ? 'thinking' : 'idle');
      break;
    case 'action_step':
      removeThinking();
      if (msg.total > 1) {
        // Show step progress inline
        const existing = document.getElementById('step-progress');
        if (existing) existing.remove();
        const el = document.createElement('div');
        el.id = 'step-progress';
        el.className = 'msg soul step-msg';
        el.textContent = `Step ${msg.step}/${msg.total}: ${msg.display_text}`;
        document.getElementById('chat').appendChild(el);
        document.getElementById('chat').scrollTop = 99999;
      }
      break;
    case 'action_pending':
      removeThinking();
      showCard(msg.action_id, msg.display_text);
      // Workspace relay is handled in the relay block at bottom of handle()
      break;
    case 'action_result':
      const r = msg.result;
      removeThinking();
      document.getElementById('step-progress')?.remove();
      if (r.auto) {
        // Auto-confirm: SILENT in chat — workspace shows the step result
        // Only surface failures so the user knows something went wrong
        if (!r.success && r.error && !r.error.includes('Unknown action')) {
          addMsg('soul', `Couldn't do that — ${r.error}`);
        }
      } else if (r.cancelled) {
        addMsg('soul', 'Action timed out.');
      } else if (!r.success) {
        addMsg('soul', `Couldn't do that — ${r.error || r.message || 'unknown error.'}`);
      }
      // Success for non-auto: nothing — the LLM text already said what happened
      break;
    case 'system_stats':
      updateStats(msg.stats);
      // Relay FULL message including thumbnail
      window.pacify?.sendWorkspace?.(msg);
      window.pacify?.sendToOrb?.(msg);
      break;
    case 'screen_toggled':
      setScreenUI(msg.enabled); break;
    case 'notification':
      showNotif(msg.text, msg.level); break;
  }
  // Buffer + relay all events to workspace and orb
  const RELAY_TYPES = ['user_message','assistant_message','thinking',
       'action_pending','action_result','action_step','system_stats'];
  if (RELAY_TYPES.includes(msg.type)) {
    bufferEvent(msg);
    window.pacify?.sendWorkspace?.(msg);
    if (msg.type !== 'system_stats') window.pacify?.sendToOrb?.(msg);
  }
}

// ── Chat ───────────────────────────────────────
function addMsg(role, text, isWake = false) {
  const c = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = `msg ${role}${isWake ? ' wake' : ''}`;
  d.textContent = text;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}
function showThinking() {
  if (document.getElementById('thinking')) return;
  const c = document.getElementById('chat');
  const d = document.createElement('div');
  d.id = 'thinking'; d.className = 'dots';
  d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function removeThinking() { document.getElementById('thinking')?.remove(); }
function showCard(id, text) {
  const c = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = 'acard'; el.id = `ac-${id}`;
  el.innerHTML = `
    <div class="atag">⚡ Confirm Action <span id="cd-${id}" style="float:right;opacity:.5;font-size:8px;">30s</span></div>
    <div class="atext">${text}</div>
    <div class="abtns">
      <button class="bok" onclick="doOk('${id}',this)">Accept</button>
      <button class="bno" onclick="doNo('${id}',this)">Cancel</button>
    </div>`;
  c.appendChild(el); c.scrollTop = c.scrollHeight;

  // Countdown timer
  let secs = 29;
  const cdEl = document.getElementById(`cd-${id}`);
  const iv = setInterval(() => {
    if (!cdEl || !document.getElementById(`ac-${id}`)) { clearInterval(iv); return; }
    secs--;
    if (secs <= 0) {
      clearInterval(iv);
      const card = document.getElementById(`ac-${id}`);
      if (card) {
        card.style.opacity = '.4';
        card.querySelector('.abtns').innerHTML = '<span style="font-size:11px;color:var(--dim)">Timed out</span>';
      }
    } else {
      cdEl.textContent = `${secs}s`;
      if (secs <= 10) cdEl.style.color = 'var(--red)';
    }
  }, 1000);
}
function doOk(id, btn) {
  send({type:'action_confirm', action_id:id});
  btn.closest('.abtns').innerHTML = '<span style="font-size:11px;color:var(--green)">Executing…</span>';
}
function doNo(id, btn) {
  send({type:'action_reject', action_id:id});
  btn.closest('.acard').style.opacity = '.4';
  btn.closest('.abtns').innerHTML = '<span style="font-size:11px;color:var(--dim)">Cancelled</span>';
}
function clearChat() {
  document.getElementById('chat').innerHTML = '';
  send({type:'clear_history'});
}

// ── Stats ──────────────────────────────────────
function updateStats(s) {
  document.getElementById('sv-cpu').textContent = s.cpu != null ? `${Math.round(s.cpu)}%` : '—';
  document.getElementById('sv-ram').textContent = s.ram != null ? `${Math.round(s.ram)}%` : '—';
  document.getElementById('sv-gpu').textContent = s.gpu || '—';
  document.getElementById('sv-net').textContent = s.net_recv ? `↓${s.net_recv}` : '—';
  document.getElementById('sv-bat').textContent = s.battery || '—';
  if (s.task_label && s.task_label !== '—') setTaskLabel(s.task_label);
}

function setTaskLabel(label) {
  const el = document.getElementById('task-label');
  el.innerHTML = label ? `<span class="task-name">${label}</span>` : '<span>—</span>';
}

// ── Signal states ──────────────────────────────
function setState(s) {
  const sig = document.getElementById('signal');
  const amb = document.getElementById('amb-sig');
  sig.classList.remove('thinking','speaking');
  amb.classList.remove('thinking','speaking');
  if (s !== 'idle') { sig.classList.add(s); amb.classList.add(s); }
}

function setLabel(t) { document.getElementById('entity-lbl').textContent = t; }
function setDot(on) {
  const d = document.getElementById('sdot');
  d.style.background = on ? 'var(--green)' : 'var(--red)';
  d.style.boxShadow  = on ? '0 0 6px var(--green)' : 'none';
}

// ── Screen toggle ──────────────────────────────
function toggleScreen() {
  screenEnabled = !screenEnabled;
  send({type:'toggle_screen', enabled:screenEnabled});
  setScreenUI(screenEnabled);
}
function setScreenUI(on) {
  screenEnabled = on;
  const tog = document.getElementById('eye-toggle');
  const bar = document.getElementById('screen-off');
  if (tog) tog.className = `eye-toggle ${on?'on':'off'}`;
  const eyePath = on
    ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  const eyeSvg = document.getElementById('eye-svg');
  if (eyeSvg) eyeSvg.innerHTML = eyePath;
  if (bar) bar.style.display = on ? 'none' : 'block';
}

// ── Notification ───────────────────────────────
function showNotif(text, level='info') {
  const n = document.getElementById('notif');
  n.textContent = text; n.className = `notif ${level}`; n.style.display = 'block';
  if (isAmbient) document.getElementById('amb-badge').style.display = 'block';
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => {
    n.style.display = 'none';
    document.getElementById('amb-badge').style.display = 'none';
  }, 5000);
}

// ── Ambient ────────────────────────────────────
function enterAmbient() {
  isAmbient = true;
  window.pacify?.setAmbient(true);
  // Main process creates orb window + hides us
}
function exitAmbient() {
  isAmbient = false;
  window.pacify?.setAmbient(false);
}
function handleAmbClick(e) {
  // Only expand if not clicking a micro-button
  if (!e.target.closest('.amb-btn')) {
    exitAmbient();
  }
}

// ── Shortcuts toggle ───────────────────────────
function toggleKbd() {
  kbdOpen = !kbdOpen;
  document.getElementById('kbd-row').classList.toggle('open', kbdOpen);
  document.getElementById('kbd-toggle-btn').classList.toggle('active', kbdOpen);
}

// ── Input ──────────────────────────────────────
let _sending = false;
document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.repeat) sendText();
});
function sendText() {
  if (_sending) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  _sending = true;
  send({type:'user_text', text});
  // Release lock after short debounce — enough to block double-fire, not enough to block next message
  setTimeout(() => { _sending = false; }, 400);
}

// ── IPC ────────────────────────────────────────
window.pacify?.onBackendError?.(m => {
  const b = document.getElementById('err');
  b.textContent = `⚠ ${m}`; b.style.display = 'block';
});
window.pacify?.onAmbientChange?.(on => {
  isAmbient = on;
  if (!on) {
    // Fade in when returning from ambient
    const shell = document.querySelector('.shell');
    if (shell) {
      shell.style.opacity = '0';
      shell.style.transform = 'scale(.97)';
      shell.style.transition = 'opacity .28s ease, transform .28s ease';
      requestAnimationFrame(() => {
        shell.style.opacity = '1';
        shell.style.transform = 'scale(1)';
        setTimeout(() => { shell.style.transition = ''; shell.style.opacity = ''; shell.style.transform = ''; }, 300);
      });
    }
  }
  // ambient is now a separate window — nothing to toggle here
});
window.pacify?.onShortcut?.(key => {
  if (key === 'toggle_screen') toggleScreen();
  else if (key === 'clear_chat') clearChat();
  else if (key === 'focus_input') document.getElementById('inp').focus();
});

// ── Workspace ──────────────────────────────────
let workspaceOpen = false;

function toggleWorkspace() {
  window.pacify?.toggleWorkspace();
}

window.pacify?.onWorkspaceOpened?.(() => {
  workspaceOpen = true;
  document.getElementById('ws-btn').classList.add('active');
  // Replay buffered events so workspace has full history
  setTimeout(() => {
    EVENT_BUFFER.forEach(e => window.pacify?.sendWorkspace?.(e));
  }, 350); // wait for workspace window to finish loading
});
window.pacify?.onWorkspaceClosed?.(() => {
  workspaceOpen = false;
  document.getElementById('ws-btn').classList.remove('active');
});

// (workspace relay is inside handle() above)

// Handle messages coming from workspace panel
window.pacify?.onWorkspaceToMain?.(data => {
  if (data.type === 'action_confirm_from_workspace') {
    send({ type: 'action_confirm', action_id: data.action_id });
  } else if (data.type === 'action_reject_from_workspace') {
    send({ type: 'action_reject', action_id: data.action_id });
  } else if (data.type === 'set_permission_tier') {
    send({ type: 'set_permission_tier', tier: data.tier });
  } else if (data.type === 'quick_action_text') {
    // Workspace quick action button -> send as user message
    send({ type: 'user_text', text: data.text });
    addMsg('user', data.text);
  }
});

connect();
</script>
</body>
</html>
